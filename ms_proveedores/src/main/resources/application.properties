spring.application.name=ms_proveedores
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/ferrefixprov
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Registro de fechas y guardado de logs
logging.file.name=ms_proveedores/logs/proveedores.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# Rutas para la comunicación con otros microservicios a través del API Gateway
api.gateway.url=http://localhost:8080
api.usuarios.path=/api/direcciones