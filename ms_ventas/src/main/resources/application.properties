spring.application.name=ms_ventas

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ferrefixventas 
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Rutas para la comunicación con otros microservicios a través del API Gateway
# Apuntamos a la apigateway del orquestador de docker o si no va a tirar error 500
api.gateway.url=http://ms-gateway:8080
api.usuarios.path=/api/usuarios
api.inventario.path=/api/inventario

# ============ CONFIGURACIÓN DE LOGGING ============
# Archivo de log
logging.file.name=ms_ventas/logs/ventas.log

# Formato de log en consola
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Formato de log en archivo
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Habilitar el cliente HTTP OkHttp eficientemente en Feign
spring.cloud.openfeign.okhttp.enabled=true

# Deshabilitar el cliente HTTP por defecto de Apache para evitar conflictos
spring.cloud.openfeign.httpclient.enabled=false