spring.application.name=ms_ventas

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ferrefixventas 
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Rutas para la comunicación con otros microservicios a través del API Gateway
api.gateway.url=http://localhost:8080
api.usuarios.path=/api/usuarios
api.inventario.path=/api/inventario

# ============ CONFIGURACIÓN DE LOGGING ============
# Archivo de log
logging.file.name=ms_ventas/logs/ventas-service.log

# Formato de log en consola
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Formato de log en archivo
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n